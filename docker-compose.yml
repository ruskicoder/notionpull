services:
  main:
    container_name: notionpull
    stdin_open: true
    tty: true
    volumes:
      - type: bind
        source: .
        target: /workspace
    working_dir: /workspace

    build:
      context: .
      dockerfile_inline: |
        FROM --platform=linux/amd64 python:3.11-slim-bookworm

        ARG DEBIAN_FRONTEND=noninteractive
        ENV TERM=xterm

        # system deps + chrome dependencies + CA certs
        RUN apt-get update && apt-get install -y \
            wget curl unzip ca-certificates \
            && update-ca-certificates \
            && rm -rf /var/lib/apt/lists/*

        # install google chrome stable
        RUN wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb \
            && apt-get update \
            && apt-get install -y ./google-chrome-stable_current_amd64.deb \
            && rm google-chrome-stable_current_amd64.deb \
            && rm -rf /var/lib/apt/lists/*

        # pre-download matching ChromeDriver (avoids runtime SSL/network call)
        # NOTE: escape ALL $ as $$ to prevent docker-compose variable substitution
        RUN CHROME_VER=$$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+') \
            && echo "Detected Chrome: $$CHROME_VER" \
            && wget -q --no-check-certificate \
               "https://storage.googleapis.com/chrome-for-testing-public/$$CHROME_VER/linux64/chromedriver-linux64.zip" \
               -O /tmp/chromedriver.zip \
            && unzip -q /tmp/chromedriver.zip -d /tmp/chromedriver \
            && cp /tmp/chromedriver/chromedriver-linux64/chromedriver /usr/local/bin/ \
            && chmod +x /usr/local/bin/chromedriver \
            && rm -rf /tmp/chromedriver /tmp/chromedriver.zip \
            && echo "ChromeDriver $$CHROME_VER installed at /usr/local/bin/chromedriver" \
            || echo "Warning: ChromeDriver pre-download failed — will use webdriver-manager at runtime"

        # python deps (pip is python 3.11's pip)
        COPY requirements.txt /tmp/requirements.txt
        RUN pip install -r /tmp/requirements.txt --no-cache-dir

        WORKDIR /workspace
        CMD ["python3", "-m", "notionpull", "--help"]
